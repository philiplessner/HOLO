{% extends "base.html" %}
{% block page_css %}
{% if blogdata.pagecss %}
    {{ blogdata.pagecss |safe }}
{% else %}
<title>{{ blogdata.title }}</title>
{% endif %}
{% endblock %}
{% block content %}
    <div class="container" style="max-width: 75em;">
        <h1>{{ blogdata.title }}</h1>
        <h4> by <i>{{ blogdata.author }} {{ blogdata.date }}</i></h4>
        <br>
        {{ blogdata.body |safe }}
    </div>



{% endblock %}
