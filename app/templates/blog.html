{% extends "base.html" %}
{% block content %}

<div class="container-fluid my-3 mx-8">
    <h2>{{ title }}</h2>
    <br><br>
    {% for row in rows %}
    <div class="row mb-2">
      <h3>{{ row[1] }} <a href="{{url_for('views.blogpost', blogid=row[3]) }}">{{ row[0] }}</a> By: {{ row[2] }}</h3>
        {% endfor %}
    </div>

{% endblock %}
